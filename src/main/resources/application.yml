spring:
  application:
    name: incident-management-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/incidents}
    username: ${DB_USERNAME:incidents}
    password: ${DB_PASSWORD:incidents}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: incident-management-api
    description: Production-style incident management REST API
    version: 0.3.0
